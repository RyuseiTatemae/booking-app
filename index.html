<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@500;700;800&family=Noto+Sans+JP:wght@400;500;600;700&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">

<style>
  :root{
    --ink:#1E2A3A;
    --brand-green:#3FA34D;
    --brand-green-dark:#2E7E3A;
    --brand-green-soft:rgba(63,163,77,0.12);
    --car-blue:#3E6FD8;
    --car-blue-dark:#2E56B0;
    --car-blue-soft:rgba(62,111,216,0.12);
    --paper:#F1F0EB;
    --paper-alt:#FFFFFF;
    --hanko:#B3392C;
    --hanko-dark:#8F2E23;
    --stamp-green:#3C7A5C;
    --guest:#C97A2E;
    --guest-dark:#A5611F;
    --guest-soft:rgba(201,122,46,0.12);
    --line:#D6D2C4;
    --muted:#6B7280;
    --shadow: 0 1px 2px rgba(30,42,58,0.06), 0 4px 12px rgba(30,42,58,0.05);
  }
  *{box-sizing:border-box;}
  body,html{margin:0;padding:0;}
  .app{
    font-family:'Noto Sans JP', sans-serif;
    background:var(--paper);
    color:var(--ink);
    min-height:100%;
    padding:28px 20px 60px;
  }
  .wrap{max-width:1080px;margin:0 auto;}

  .header{
    display:flex;justify-content:space-between;align-items:flex-end;
    border-bottom:2px solid var(--ink);
    padding-bottom:14px;margin-bottom:22px;
    flex-wrap:wrap;gap:10px;
  }
  .header .title{
    font-family:'Shippori Mincho', serif;font-weight:800;font-size:28px;letter-spacing:.04em;
    display:flex;align-items:center;gap:14px;
  }
  .header .title .brand-logo{
    height:26px;width:auto;display:block;flex-shrink:0;
  }
  .header .sub{font-size:12px;color:var(--muted);letter-spacing:.05em;}

  .tabrow{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px;margin-bottom:18px;}
  .tabs{display:flex;gap:8px;}
  .tab-btn{
    font-family:'Shippori Mincho', serif;font-weight:700;font-size:15px;padding:9px 20px;
    background:transparent;border:1.5px solid var(--ink);color:var(--ink);cursor:pointer;
    border-radius:999px;letter-spacing:.06em;transition:background .15s, color .15s;
  }
  .tab-btn.active{background:var(--ink);color:#fff;}
  .tab-btn.active[data-cat="room"]{background:var(--brand-green);}
  .tab-btn.active[data-cat="car"]{background:var(--car-blue);}
  .tab-btn.active[data-cat="guest"]{background:var(--guest);}
  .tab-btn:not(.active):hover{background:rgba(30,42,58,0.06);}

  .view-toggle{display:flex;border:1px solid var(--line);border-radius:999px;overflow:hidden;background:#fff;}
  .view-toggle button{
    border:none;background:#fff;padding:7px 16px;font-size:12.5px;cursor:pointer;color:var(--muted);
    font-family:'Noto Sans JP',sans-serif;font-weight:600;
  }
  .view-toggle button.active{background:var(--brand-green);color:#fff;}

  .datebar{
    display:flex;align-items:center;gap:10px;background:var(--paper-alt);border:1px solid var(--line);
    border-radius:26px;padding:10px 18px;margin-bottom:20px;box-shadow:var(--shadow);flex-wrap:wrap;
  }
  .datebar button{border:1px solid var(--line);background:#fff;color:var(--ink);border-radius:999px;width:32px;height:32px;cursor:pointer;font-size:15px;}
  .datebar button:hover{background:var(--paper);}
  .datebar input[type=date]{font-family:'JetBrains Mono', monospace;font-size:14px;border:1px solid var(--line);border-radius:14px;padding:6px 12px;background:#fff;color:var(--ink);}
  .date-weekday{font-size:14px;color:var(--ink);font-weight:600;}
  .date-input-row{display:flex;align-items:center;gap:10px;}
  .date-input-row input{flex:1;}
  .datebar .today-btn{width:auto;padding:0 12px;font-size:12px;font-family:'Noto Sans JP',sans-serif;}

  /* ---- Day board ---- */
  .board{background:var(--paper-alt);border:1px solid var(--line);border-radius:24px;box-shadow:var(--shadow);margin-bottom:26px;overflow:hidden;}
  .board-head{display:flex;border-bottom:1px solid var(--line);padding:10px 16px 8px 150px;font-family:'JetBrains Mono', monospace;font-size:11px;color:var(--muted);}
  .board-head span{flex:1;text-align:left;}
  .row{display:flex;align-items:stretch;border-bottom:1px solid var(--line);}
  .row:last-child{border-bottom:none;}
  .row-label{width:150px;flex-shrink:0;display:flex;align-items:center;gap:8px;padding:10px 12px;font-size:13px;font-weight:600;border-right:1px solid var(--line);background:#FAF9F5;}
  .row-label .dot{width:7px;height:7px;border-radius:50%;background:var(--brand-green);flex-shrink:0;}
  .row-label.guest .dot{background:var(--guest);}
  .row-label.car .dot{background:var(--car-blue);}
  .board-rows{
    position:relative;
    background-image:repeating-linear-gradient(to right, var(--line) 0, var(--line) 1px, transparent 1px, transparent calc(100%/12));
    background-size:calc(100% - 150px) 100%;
    background-position:150px 0;
    background-repeat:no-repeat;
  }
  .row-track{position:relative;flex:1;min-height:46px;}
  .row-track:hover{background-color:rgba(62,111,216,0.03);cursor:pointer;}
  .slot{position:absolute;background:var(--brand-green);border-radius:14px;color:#fff;display:flex;flex-direction:column;justify-content:center;padding:3px 10px;overflow:hidden;box-shadow:0 2px 6px rgba(0,0,0,0.14);cursor:default;}
  .slot.guest{background:var(--guest);}
  .slot.car{background:var(--car-blue);}
  .slot .who{font-weight:700;font-size:12px;white-space:nowrap;text-overflow:ellipsis;overflow:hidden;}
  .slot .time{font-family:'JetBrains Mono',monospace;font-size:9.5px;opacity:.85;}

  .add-bar{display:flex;justify-content:flex-end;margin-bottom:16px;}
  .add-btn{font-family:'Shippori Mincho', serif;font-weight:700;background:var(--brand-green);color:#fff;border:none;padding:11px 24px;border-radius:999px;cursor:pointer;font-size:14px;letter-spacing:.04em;box-shadow:0 3px 10px rgba(63,163,77,0.3);transition:background .15s;}
  .add-btn:hover{background:var(--brand-green-dark);}

  /* ---- Week board ---- */
  .week-grid{display:grid;grid-template-columns:140px repeat(7, 1fr);}
  .week-head-cell{padding:9px 6px;text-align:center;font-size:11.5px;font-weight:700;border-bottom:1px solid var(--line);border-right:1px solid var(--line);background:#FAF9F5;}
  .week-head-cell .d{font-family:'JetBrains Mono',monospace;font-weight:500;color:var(--muted);font-size:10px;}
  .week-head-cell.today{color:var(--brand-green-dark);}
  .week-row-label{padding:10px 12px;font-size:13px;font-weight:600;border-bottom:1px solid var(--line);border-right:1px solid var(--line);background:#FAF9F5;display:flex;align-items:center;gap:8px;}
  .week-row-label .dot{width:7px;height:7px;border-radius:50%;background:var(--brand-green);flex-shrink:0;}
  .week-row-label.guest .dot{background:var(--guest);}
  .week-row-label.car .dot{background:var(--car-blue);}
  .week-cell{border-bottom:1px solid var(--line);border-right:1px solid var(--line);padding:5px;min-height:56px;max-height:160px;overflow-y:auto;display:flex;flex-direction:column;gap:4px;cursor:pointer;}
  .week-cell:hover{background:rgba(62,111,216,0.03);}
  .week-chip{background:var(--brand-green);color:#fff;border-radius:999px;padding:3px 10px;font-size:11px;line-height:1.3;}
  .week-chip.guest{background:var(--guest);}
  .week-chip.car{background:var(--car-blue);}
  .week-chip .who{font-weight:700;display:block;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .week-chip .time{font-family:'JetBrains Mono',monospace;font-size:9px;opacity:.85;}

  /* ---- Ledger ---- */
  .ledger{background:var(--paper-alt);border:1px solid var(--line);border-radius:24px;box-shadow:var(--shadow);overflow:hidden;}
  .ledger-title{font-family:'Shippori Mincho', serif;font-weight:700;font-size:15px;padding:14px 18px;border-bottom:1px solid var(--line);display:flex;justify-content:space-between;align-items:center;}
  .ledger-title .count{font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--muted);font-weight:500;}
  table{width:100%;border-collapse:collapse;}
  th{text-align:left;font-size:11px;color:var(--muted);font-weight:600;padding:9px 14px;border-bottom:1px solid var(--line);background:#FAF9F5;letter-spacing:.04em;}
  td{padding:11px 14px;font-size:13px;border-bottom:1px solid var(--line);vertical-align:middle;}
  tr:last-child td{border-bottom:none;}
  .badge{display:inline-block;padding:3px 10px;border-radius:999px;font-size:11px;font-weight:600;background:var(--brand-green-soft);color:var(--brand-green-dark);}
  .badge.guest{background:var(--guest-soft);color:var(--guest-dark);}
  .badge.car{background:var(--car-blue-soft);color:var(--car-blue-dark);}
  .who-cell{font-weight:700;}
  .cancel-btn{border:1px solid var(--hanko);color:var(--hanko);background:#fff;border-radius:999px;padding:5px 14px;font-size:12px;cursor:pointer;font-family:'Noto Sans JP',sans-serif;font-weight:600;transition:background .15s,color .15s;}
  .cancel-btn:hover{background:var(--hanko);color:#fff;}
  .empty-row td{text-align:center;color:var(--muted);padding:32px;font-size:13px;}

  /* ---- Modal ---- */
  .overlay{position:fixed;inset:0;background:rgba(30,42,58,0.45);display:none;align-items:center;justify-content:center;z-index:50;padding:20px;}
  .overlay.show{display:flex;}
  .modal{background:#fff;border-radius:24px;max-width:440px;width:100%;box-shadow:0 12px 40px rgba(0,0,0,0.25);animation:pop .15s ease-out;max-height:90vh;overflow-y:auto;}
  @keyframes pop{from{opacity:0;transform:scale(.97)}to{opacity:1;transform:scale(1)}}
  .modal-head{font-family:'Shippori Mincho', serif;font-weight:700;font-size:17px;padding:18px 22px 12px;border-bottom:1px solid var(--line);display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;background:#fff;border-radius:24px 24px 0 0;}
  .modal-head button{background:none;border:none;font-size:18px;cursor:pointer;color:var(--muted);}
  .modal-body{padding:18px 22px;display:flex;flex-direction:column;gap:14px;}
  .field label{display:block;font-size:12px;color:var(--muted);margin-bottom:5px;font-weight:600;}
  .field input, .field select, .field textarea{width:100%;padding:9px 14px;border:1px solid var(--line);border-radius:14px;font-size:14px;font-family:'Noto Sans JP',sans-serif;color:var(--ink);background:#FAF9F5;}
  .field textarea{resize:vertical;line-height:1.5;}
  .field input:focus, .field select:focus, .field textarea:focus{outline:2px solid var(--brand-green);outline-offset:1px;background:#fff;}
  .field-row{display:flex;gap:10px;}
  .time-select-row{display:flex;align-items:center;gap:6px;}
  .time-select-row select{width:auto;flex:1;text-align:center;}
  .time-select-row span{color:var(--muted);font-weight:600;}
  .field-row .field{flex:1;}
  .check-row{display:flex;align-items:center;gap:8px;font-size:13px;padding:4px 0;}
  .weekday-picker{display:flex;gap:6px;flex-wrap:wrap;}
  .wd-pill{display:inline-flex;align-items:center;gap:4px;border:1px solid var(--line);border-radius:999px;padding:6px 12px;font-size:12.5px;cursor:pointer;background:#FAF9F5;user-select:none;}
  .wd-pill input{width:auto;margin:0;accent-color:var(--brand-green);}
  .wd-pill:has(input:checked){background:var(--brand-green-soft);border-color:var(--brand-green);color:var(--brand-green-dark);font-weight:600;}
  .check-row input{width:auto;}
  .error-msg{background:rgba(179,57,44,0.08);color:var(--hanko-dark);border:1px solid rgba(179,57,44,0.3);border-radius:16px;padding:9px 14px;font-size:12.5px;display:none;line-height:1.5;}
  .error-msg.show{display:block;}
  .info-box{background:#FAF9F5;border:1px solid var(--line);border-radius:16px;padding:10px 14px;font-size:12px;color:var(--muted);line-height:1.6;}
  .modal-foot{padding:14px 22px 20px;display:flex;justify-content:flex-end;gap:10px;position:sticky;bottom:0;background:#fff;border-radius:0 0 24px 24px;}
  .btn-secondary{background:#fff;border:1px solid var(--line);color:var(--ink);padding:9px 20px;border-radius:999px;cursor:pointer;font-size:13px;font-family:'Noto Sans JP',sans-serif;}
  .btn-primary{background:var(--brand-green);border:none;color:#fff;padding:9px 20px;border-radius:999px;cursor:pointer;font-size:13px;font-weight:600;font-family:'Noto Sans JP',sans-serif;box-shadow:0 2px 8px rgba(63,163,77,0.25);}
  .btn-primary:hover{background:var(--brand-green-dark);}
  .btn-danger{background:var(--hanko);border:none;color:#fff;padding:9px 20px;border-radius:999px;cursor:pointer;font-size:13px;font-weight:600;font-family:'Noto Sans JP',sans-serif;}
  .btn-danger:hover{background:var(--hanko-dark);}

  .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--ink);color:#fff;padding:11px 24px;border-radius:20px;font-size:13px;box-shadow:0 6px 20px rgba(0,0,0,0.25);opacity:0;transition:opacity .2s, transform .2s;pointer-events:none;z-index:100;display:flex;align-items:center;gap:8px;max-width:min(90vw,560px);line-height:1.5;}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
  .toast .dot{width:7px;height:7px;border-radius:50%;background:var(--stamp-green);flex-shrink:0;margin-top:1px;}
  .toast.err .dot{background:var(--hanko);}

  .loading{padding:60px;text-align:center;color:var(--muted);font-size:13px;}

  @media (max-width:640px){
    .row-label{width:100px;font-size:12px;}
    .board-head{padding-left:100px;}
    .field-row{flex-direction:column;}
    .week-grid{grid-template-columns:80px repeat(7, minmax(90px,1fr));overflow-x:auto;}
  }
</style>

    <div class="tabrow">
      <div class="tabs">
        <button class="tab-btn active" data-cat="room" onclick="switchCategory('room')">会議室</button>
        <button class="tab-btn" data-cat="car" onclick="switchCategory('car')">社用車</button>
        <button class="tab-btn" data-cat="guest" onclick="switchCategory('guest')">来客</button>
      </div>

        <button id="view-day-btn" class="active" onclick="switchViewMode('day')">日ごと</button>

      </div>

      <button onclick="shiftDate(1)" aria-label="次へ">›</button>

        <span class="count" id="ledger-count"></span>

        <thead id="ledger-thead"></thead>
        <tbody id="ledger-body"></tbody>
      </table>

<!-- 予約作成モーダル -->
<div class="overlay" id="overlay">
  <div class="modal">
    <div class="modal-head"><span id="modal-title-text">予約を入れる</span><button onclick="closeModal()" aria-label="閉じる">✕</button></div>
    <div class="modal-body">
      <div class="error-msg" id="modal-error"></div>

      <div class="field">
        <label>区分</label>
        <select id="f-category" onchange="onCategoryChangeInModal()">
          <option value="room">会議室</option>
          <option value="car">社用車</option>
          <option value="guest">来客</option>
        </select>
      </div>

      <div class="field" id="field-resource-wrap">
        <label>対象</label>
        <select id="f-resource"></select>
      </div>

      <div class="field" id="field-visitor-wrap" style="display:none">
        <label>来客者名</label>
        <input type="text" id="f-visitor" placeholder="例: 〇〇商事 田中様">
      </div>

      <div class="field">
        <label>日付</label>
        <div class="date-input-row">
          <input type="date" id="f-date" onchange="updateFDateWeekday()">
          <span class="date-weekday" id="f-date-weekday"></span>
        </div>
      </div>
      <div class="field-row">
        <div class="field">
          <label>開始時刻</label>
          <div class="time-select-row">
            <select id="f-start-h"></select><span>:</span><select id="f-start-m"></select>
          </div>
        </div>
        <div class="field">
          <label>終了時刻</label>
          <div class="time-select-row">
            <select id="f-end-h"></select><span>:</span><select id="f-end-m"></select>
          </div>
        </div>
      </div>

      <div class="field">
        <label>件名</label>
        <input type="text" id="f-purpose" placeholder="例: 定例MTG、〇〇商事様訪問 など">
      </div>

      <div class="field">
        <label>メモ（任意）</label>
        <textarea id="f-memo" rows="2" placeholder="補足事項があれば入力してください"></textarea>
      </div>

      <div id="field-recurring-wrap">
        <div class="check-row">
          <input type="checkbox" id="f-recurring-check" onchange="toggleRecurring()">
          <label for="f-recurring-check" style="margin:0;font-weight:600;color:var(--ink);">繰り返し予約にする</label>
        </div>
        <div id="field-recurring-options-wrap" style="display:none;margin-top:8px;">
          <div class="field">
            <label>繰り返しの種類</label>
            <select id="f-recurring-type" onchange="onRecurringTypeChange()">
              <option value="weekly">毎週</option>
              <option value="monthly">毎月</option>
            </select>
          </div>

          <div class="field" id="field-recurring-weekdays-wrap">
            <label>曜日(複数選択可)</label>
            <div class="weekday-picker" id="f-recurring-weekdays">
              <label class="wd-pill"><input type="checkbox" value="0">日</label>
              <label class="wd-pill"><input type="checkbox" value="1">月</label>
              <label class="wd-pill"><input type="checkbox" value="2">火</label>
              <label class="wd-pill"><input type="checkbox" value="3">水</label>
              <label class="wd-pill"><input type="checkbox" value="4">木</label>
              <label class="wd-pill"><input type="checkbox" value="5">金</label>
              <label class="wd-pill"><input type="checkbox" value="6">土</label>
            </div>
          </div>

          <div id="field-recurring-monthly-wrap" style="display:none">
            <div class="field">
              <label>毎月のパターン</label>
              <select id="f-recurring-monthly-mode" onchange="onMonthlyModeChange()">
                <option value="dayOfMonth">日付を指定（毎月◯日）</option>
                <option value="nthWeekday">曜日を指定（第◯ 何曜日）</option>
              </select>
            </div>
            <div class="field" id="field-recurring-dayofmonth-wrap" style="margin-top:8px;">
              <label>毎月</label>
              <input type="number" id="f-recurring-dayofmonth" min="1" max="31">
            </div>
            <div class="field-row" id="field-recurring-nthweekday-wrap" style="display:none;margin-top:8px;">
              <div class="field">
                <label>週</label>
                <select id="f-recurring-nth">
                  <option value="1">第1</option>
                  <option value="2">第2</option>
                  <option value="3">第3</option>
                  <option value="4">第4</option>
                  <option value="5">第5</option>
                </select>
              </div>
              <div class="field">
                <label>曜日</label>
                <select id="f-recurring-nth-weekday">
                  <option value="0">日曜日</option>
                  <option value="1">月曜日</option>
                  <option value="2">火曜日</option>
                  <option value="3">水曜日</option>
                  <option value="4">木曜日</option>
                  <option value="5">金曜日</option>
                  <option value="6">土曜日</option>
                </select>
              </div>
            </div>
          </div>

          <div class="field" style="margin-top:8px;">
            <label>繰り返し終了日</label>
            <input type="date" id="f-recurring-until">
          </div>
        </div>
        <div class="info-box" id="field-recurring-info" style="display:none;margin-top:6px;">起点の日時・時間はそのままで、指定した条件で終了日まで繰り返し登録します。時間が被っている回・該当日がない回は自動でスキップされ、あとでどの回がスキップされたかお知らせします（一度に登録できるのは最大60件です）。</div>
      </div>

      <div id="field-linkroom-wrap" style="display:none">
        <div class="check-row">
          <input type="checkbox" id="f-linkroom-check" onchange="toggleLinkRoom()">
          <label for="f-linkroom-check" style="margin:0;font-weight:600;color:var(--ink);">会議室も同時に予約する</label>
        </div>
        <div class="field" id="field-linkroom-select-wrap" style="display:none;margin-top:8px;">
          <label>使用する会議室</label>
          <select id="f-linkroom-resource"></select>
          <div class="info-box" style="margin-top:6px;">来客の対応時間と同じ日時で、選択した会議室を予約します。その会議室が既に埋まっている場合はまとめて登録できません。</div>
        </div>
      </div>

      <div class="field">

<script>
const ROOMS = ["大会議室","小会議室","ミーティングルームA","ミーティングルームB","応接室"];
const CARS  = ["プリウス","ハイエース","プロボックス","軽トラ","軽バン"];
const GUEST_RESOURCE = "来客";
const DAY_START = 8;
const DAY_END   = 20;

const CONFIG = {
  API_URL: "https://script.google.com/macros/s/AKfycbxs0He7qwF4wnOen07fDLUv6kIf-SwmlxggD2lIbu2DjU9brtbZenJit8cKEbQj_GURFg/exec"
};

let bookings = [];
let currentCategory = "room";
let currentDate = todayStr();
let currentViewMode = "day"; // 'day' | 'week'
let pendingCancelId = null;
let editingId = null;
let editingLinkedRoomId = null;

function formatLocalDate(d){
  return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
}
function todayStr(){ return formatLocalDate(new Date()); }
function pad(n){ return String(n).padStart(2,"0"); }

// ---------- 時刻プルダウン(10分刻み) ----------
function populateTimeSelects(){
  const hourOptions = [];
  for(let h=0; h<24; h++) hourOptions.push(`<option value="${pad(h)}">${pad(h)}</option>`);
  const minuteOptions = [];
  for(let m=0; m<60; m+=10) minuteOptions.push(`<option value="${pad(m)}">${pad(m)}</option>`);
  ["f-start","f-end"].forEach(prefix=>{
    document.getElementById(`${prefix}-h`).innerHTML = hourOptions.join("");
    document.getElementById(`${prefix}-m`).innerHTML = minuteOptions.join("");
  });
}
function getTimeValue(prefix){
  const h = document.getElementById(`${prefix}-h`).value;
  const m = document.getElementById(`${prefix}-m`).value;
  return `${h}:${m}`;
}
function setTimeValue(prefix, hhmm){
  const hSel = document.getElementById(`${prefix}-h`);
  const mSel = document.getElementById(`${prefix}-m`);
  if(!hhmm){
    hSel.selectedIndex = 0;
    mSel.selectedIndex = 0;
    return;
  }
  const parts = String(hhmm).trim().split(":");
  const h = parseInt(parts[0], 10);
  const m = parseInt(parts[1], 10);
  if(isNaN(h) || isNaN(m)){
    hSel.selectedIndex = 0;
    mSel.selectedIndex = 0;
    return;
  }
  // 10分刻みでない値(例: 過去に15分刻みで登録された予約)は直近の10分単位に切り捨てて表示
  hSel.value = pad(((h % 24) + 24) % 24);
  mSel.value = pad(Math.floor(m / 10) * 10 % 60);
}
function toMinutes(t){ const [h,m] = t.split(":").map(Number); return h*60+m; }
function resourceList(cat){ return cat === "room" ? ROOMS : (cat === "car" ? CARS : [GUEST_RESOURCE]); }
function escapeHtml(s){ return String(s ?? "").replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c])); }

// ---------- backend ----------
function padTime(t){
  if(!t) return t;
  const parts = String(t).trim().split(":");
  const h = parseInt(parts[0], 10);
  const m = parseInt(parts[1], 10);
  if(isNaN(h) || isNaN(m)) return t;
  return `${pad(h)}:${pad(m)}`;
}

async function loadBookings(){
  try{
    const res = await fetch(CONFIG.API_URL, { method: "GET" });
    const data = await res.json();
    bookings = data.success ? data.bookings : [];
    bookings.forEach(b => { b.start = padTime(b.start); b.end = padTime(b.end); });
  }catch(e){
    console.error(e);
    showToast("予約データの取得に失敗しました。通信状況を確認してください。", true);
  }
}
async function addBookingRemote(booking){
  const res = await fetch(CONFIG.API_URL, {
    method: "POST",
    headers: { "Content-Type": "text/plain;charset=utf-8" },
    body: JSON.stringify({ action: "add", booking })
  });
  return await res.json();
}
async function editBookingRemote(id, booking){
  const res = await fetch(CONFIG.API_URL, {
    method: "POST",
    headers: { "Content-Type": "text/plain;charset=utf-8" },
    body: JSON.stringify({ action: "edit", id, booking })
  });
  return await res.json();
}
async function cancelBookingRemote(id, cascade){
  const res = await fetch(CONFIG.API_URL, {
    method: "POST",
    headers: { "Content-Type": "text/plain;charset=utf-8" },
    body: JSON.stringify({ action: "cancel", id, cascade })
  });
  return await res.json();
}

// ---------- date helpers ----------
function weekdayLabel(dateStr){
  const wd = ["日","月","火","水","木","金","土"];
  const d = new Date(dateStr + "T00:00:00");
  return `${d.getMonth()+1}月${d.getDate()}日（${wd[d.getDay()]}）`;
}
function weekdayShort(dateStr){
  const wd = ["日","月","火","水","木","金","土"];
  const d = new Date(dateStr + "T00:00:00");
  return `（${wd[d.getDay()]}）`;
}
function updateFDateWeekday(){
  const v = document.getElementById("f-date").value;
  document.getElementById("f-date-weekday").textContent = v ? weekdayShort(v) : "";
}
function getWeekStart(dateStr){
  const d = new Date(dateStr + "T00:00:00");
  const day = d.getDay();
  const diff = (day === 0 ? -6 : 1 - day);
  d.setDate(d.getDate() + diff);
  return formatLocalDate(d);
}
function addDays(dateStr, n){
  const d = new Date(dateStr + "T00:00:00");
  d.setDate(d.getDate() + n);
  return formatLocalDate(d);
}
function getWeekDates(weekStartStr){
  const arr = [];
  for(let i=0;i<7;i++) arr.push(addDays(weekStartStr, i));
  return arr;
}

function switchViewMode(mode){

  document.getElementById("view-day-btn").classList.toggle("active", mode === "day");
  document.getElementById("view-week-btn").classList.toggle("active", mode === "week");

function shiftDate(delta){
  currentDate = addDays(currentDate, currentViewMode === "week" ? delta * 7 : delta);

  render();
}
function goToday(){

  render();
}
function onDateChange(){

function render(){

// ---------- day board ----------
function renderDayBoard(){
  const board = document.getElementById("board");
  const list = resourceList(currentCategory);
  const dayBookings = bookings.filter(b => b.category === currentCategory && b.date === currentDate);
  const totalMin = (DAY_END - DAY_START) * 60;

  let html = `<div class="board-head">`;
  for(let h = DAY_START; h < DAY_END; h += 1) html += `<span>${pad(h)}:00</span>`;
  html += `</div>`;

  html += `<div class="board-rows">`;

  list.forEach(resource=>{
    const items = dayBookings.filter(b => b.resource === resource).sort((a,b)=>toMinutes(a.start)-toMinutes(b.start));
    const lanes = packLanes(items);
    const laneHeight = 34;
    const trackHeight = Math.max(1, lanes) * laneHeight + 16;

    html += `<div class="row">
      <div class="row-label${currentCategory==='guest'?' guest':(currentCategory==='car'?' car':'')}"><span class="dot"></span>${resource}</div>
      <div class="row-track" style="height:${trackHeight}px" onclick="quickAdd('${resource}')">`;
    items.forEach(b=>{
      const startMin = Math.max(toMinutes(b.start), DAY_START*60);
      const endMin = Math.min(toMinutes(b.end), DAY_END*60);
      const left = ((startMin - DAY_START*60) / totalMin) * 100;
      const width = ((endMin - startMin) / totalMin) * 100;
      const top = 8 + b._lane * laneHeight;
      html += `<div class="slot${currentCategory==='guest'?' guest':(currentCategory==='car'?' car':'')}"
                style="left:${left}%;width:${Math.max(width,2)}%;top:${top}px;height:${laneHeight-6}px"
                title="${escapeHtml(b.purpose)} / ${escapeHtml(b.empName)} ${b.start}〜${b.end}${b.visitorName?(' / 来客: '+escapeHtml(b.visitorName)):''}"
                onclick="event.stopPropagation();openCancelModal('${b.id}')">
                <span class="who">${escapeHtml(b.empName)}</span>
              </div>`;
    });
    html += `</div></div>`;
  });

  html += `</div>`;

  board.innerHTML = html;
}

function packLanes(items){
  const laneEnds = [];
  items.forEach(it=>{
    const s = toMinutes(it.start), e = toMinutes(it.end);
    let placed = false;
    for(let i=0;i<laneEnds.length;i++){
      if(laneEnds[i] <= s){ it._lane = i; laneEnds[i] = e; placed = true; break; }
    }
    if(!placed){ it._lane = laneEnds.length; laneEnds.push(e); }
  });
  return laneEnds.length;
}

// ---------- week board ----------
function renderWeekBoard(){
  const board = document.getElementById("board");
  const list = resourceList(currentCategory);
  const weekStart = getWeekStart(currentDate);
  const weekDates = getWeekDates(weekStart);
  const wd = ["日","月","火","水","木","金","土"];
  const today = todayStr();

  let html = `<div class="week-grid">`;
  html += `<div class="week-head-cell"></div>`;
  weekDates.forEach(d=>{
    const dt = new Date(d + "T00:00:00");
    html += `<div class="week-head-cell${d===today?' today':''}">${dt.getMonth()+1}/${dt.getDate()}<div class="d">（${wd[dt.getDay()]}）</div></div>`;
  });

  list.forEach(resource=>{
    html += `<div class="week-row-label${currentCategory==='guest'?' guest':(currentCategory==='car'?' car':'')}"><span class="dot"></span>${resource}</div>`;
    weekDates.forEach(d=>{
      const items = bookings.filter(b => b.category === currentCategory && b.resource === resource && b.date === d)
                             .sort((a,b)=>toMinutes(a.start)-toMinutes(b.start));
      html += `<div class="week-cell" onclick="quickAddOnDate('${resource}','${d}')">`;
      items.forEach(b=>{
        html += `<div class="week-chip${currentCategory==='guest'?' guest':(currentCategory==='car'?' car':'')}" onclick="event.stopPropagation();openCancelModal('${b.id}')"
                  title="${escapeHtml(b.purpose)} / ${escapeHtml(b.empName)} ${b.start}〜${b.end}">
                  <span class="who">${escapeHtml(b.empName)}</span>
                </div>`;
      });
      html += `</div>`;
    });
  });
  html += `</div>`;
  board.innerHTML = html;
}

  document.getElementById("ledger-thead").innerHTML = ledgerHeaderRow(false);

function renderLedgerWeek(){
  document.getElementById("ledger-thead").innerHTML = ledgerHeaderRow(true);
  const catLabel = currentCategory === "room" ? "会議室" : (currentCategory === "car" ? "社用車" : "来客");

// 指定した年月(0始まり月)の「第nth 曜日weekday」の日付を返す。存在しなければnull
function nthWeekdayOfMonth(year, monthIndex, nth, weekday){
  const first = new Date(year, monthIndex, 1);
  const firstWeekday = first.getDay();
  const offset = (weekday - firstWeekday + 7) % 7;
  const day = 1 + offset + (nth - 1) * 7;
  const lastDay = new Date(year, monthIndex + 1, 0).getDate();
  if(day > lastDay) return null;
  return formatLocalDate(new Date(year, monthIndex, day));
}

// 繰り返し条件から対象日リストを生成する
async function generateRecurringDates(baseDate){
  const until = document.getElementById("f-recurring-until").value;
  if(!until) return { error: "繰り返し終了日を入力してください。" };
  if(until < baseDate) return { error: "繰り返し終了日は開始日以降にしてください。" };

  const MAX_OCCURRENCES = 60;
  const type = document.getElementById("f-recurring-type").value;
  const dates = [];
  const skipped = [];

  if(type === "weekly"){
    const weekdays = Array.from(document.querySelectorAll('#f-recurring-weekdays input:checked')).map(el => parseInt(el.value, 10));
    if(weekdays.length === 0) return { error: "繰り返す曜日を1つ以上選んでください。" };
    let cursor = baseDate;
    let guard = 0;
    while(cursor <= until && dates.length < MAX_OCCURRENCES && guard < 1000){
      const d = new Date(cursor + "T00:00:00");
      if(weekdays.includes(d.getDay())) dates.push(cursor);
      cursor = addDays(cursor, 1);
      guard++;
    }
  } else {
    const mode = document.getElementById("f-recurring-monthly-mode").value;
    const start = new Date(baseDate + "T00:00:00");
    const baseY = start.getFullYear(), baseM = start.getMonth();
    for(let i = 0; i < 240 && dates.length < MAX_OCCURRENCES; i++){
      const ty = baseY + Math.floor((baseM + i) / 12);
      const tm = (baseM + i) % 12;
      const monthStart = formatLocalDate(new Date(ty, tm, 1));
      if(monthStart > until) break;

      let occ = null;
      if(mode === "dayOfMonth"){
        const day = parseInt(document.getElementById("f-recurring-dayofmonth").value, 10);
        const lastDay = new Date(ty, tm + 1, 0).getDate();
        if(day >= 1 && day <= lastDay){
          occ = formatLocalDate(new Date(ty, tm, day));
        } else {
          skipped.push(`${ty}/${tm+1}（該当日なし）`);
        }
      } else {
        const nth = parseInt(document.getElementById("f-recurring-nth").value, 10);
        const wd = parseInt(document.getElementById("f-recurring-nth-weekday").value, 10);
        occ = nthWeekdayOfMonth(ty, tm, nth, wd);
        if(!occ) skipped.push(`${ty}/${tm+1}（該当日なし）`);
      }
      if(occ && occ >= baseDate && occ <= until) dates.push(occ);
    }
  }

  if(dates.length === 0) return { error: "条件に合う日付がありませんでした。終了日や曜日の指定を見直してください。" };
  return { dates, skipped };
}

function openModal(){

  updateFDateWeekday();
  setTimeValue("f-start", "");
  setTimeValue("f-end", "");
  document.getElementById("f-purpose").value = "";
  document.getElementById("f-memo").value = "";
  document.getElementById("f-visitor").value = "";
  document.getElementById("f-empname").value = "";
  document.getElementById("field-recurring-wrap").style.display = "";
  document.getElementById("f-recurring-check").checked = false;
  document.getElementById("f-recurring-type").value = "weekly";
  document.getElementById("f-recurring-monthly-mode").value = "dayOfMonth";
  document.getElementById("f-recurring-until").value = "";
  onRecurringTypeChange();
  onMonthlyModeChange();
  toggleRecurring();
  hideModalError();
  document.getElementById("overlay").classList.add("show");
}

function openEditModal(id){
  const b = findById(id);
  if(!b) return;
  editingId = id;
  editingLinkedRoomId = null;
  document.getElementById("modal-title-text").textContent = "予約を編集する";
  document.getElementById("modal-submit-btn").textContent = "変更を保存";
  hideModalError();

  const catSel = document.getElementById("f-category");
  catSel.value = b.category;
  catSel.disabled = true; // 編集時は区分の変更不可（会議室↔来客などの切替は新規作成し直してください）
  applyCategoryFieldVisibility(b.category);

  document.getElementById("f-date").value = b.date;
  updateFDateWeekday();
  setTimeValue("f-start", b.start);
  setTimeValue("f-end", b.end);
  document.getElementById("f-purpose").value = b.purpose || "";
  document.getElementById("f-memo").value = b.memo || "";
  document.getElementById("f-empname").value = b.empName || "";
  document.getElementById("field-recurring-wrap").style.display = "none";
  document.getElementById("f-recurring-check").checked = false;
  toggleRecurring();

  if(b.category === "guest"){
    document.getElementById("f-visitor").value = b.visitorName || "";
    const linkedRoom = b.linkedId ? findById(b.linkedId) : null;
    if(linkedRoom){
      editingLinkedRoomId = linkedRoom.id;
      document.getElementById("f-linkroom-check").checked = true;
      document.getElementById("field-linkroom-select-wrap").style.display = "";
      document.getElementById("f-linkroom-resource").value = linkedRoom.resource;
    } else {
      document.getElementById("f-linkroom-check").checked = false;
      document.getElementById("field-linkroom-select-wrap").style.display = "none";
    }
  } else {
    document.getElementById("f-resource").value = b.resource;
  }

  document.getElementById("overlay").classList.add("show");
}

function editFromCancelModal(){
  const id = pendingCancelId;
  closeCancelModal();
  if(id) openEditModal(id);
}

function quickAdd(resource){
  openModal();
  if(currentCategory !== "guest") document.getElementById("f-resource").value = resource;
}
function quickAddOnDate(resource, date){
  openModal();
  document.getElementById("f-date").value = date;
  updateFDateWeekday();
  if(currentCategory !== "guest") document.getElementById("f-resource").value = resource;
}
function closeModal(){
  document.getElementById("overlay").classList.remove("show");
  document.getElementById("f-category").disabled = false;
  editingId = null;
}
function showModalError(msg){
  const el = document.getElementById("modal-error");
  el.textContent = msg;
  el.classList.add("show");
  el.scrollIntoView({ behavior: "smooth", block: "nearest" });
}
function hideModalError(){ document.getElementById("modal-error").classList.remove("show"); }

function hasOverlap(category, resource, date, start, end, excludeId){
  if(category === "guest") return false;
  const s = toMinutes(start), e = toMinutes(end);
  return bookings.some(b=>{
    if(b.id === excludeId) return false;
    if(b.category !== category || b.resource !== resource || b.date !== date) return false;
    const bs = toMinutes(b.start), be = toMinutes(b.end);
    return s < be && bs < e;
  });
}

async function submitBooking(){
  const category = document.getElementById("f-category").value;
  const date = document.getElementById("f-date").value;
  const start = getTimeValue("f-start");
  const end = getTimeValue("f-end");
  const purpose = document.getElementById("f-purpose").value.trim();
  const memo = document.getElementById("f-memo").value.trim();
  const empName = document.getElementById("f-empname").value.trim();

  if(!date || !start || !end){ showModalError("日付・開始時刻・終了時刻を入力してください。"); return; }
  if(toMinutes(start) >= toMinutes(end)){ showModalError("終了時刻は開始時刻より後にしてください。"); return; }
  if(!purpose){ showModalError("件名を入力してください。"); return; }
  if(!empName){ showModalError("予約者を入力してください。"); return; }

  const booking = { category, date, start, end, purpose, empName, memo };

  if(category === "guest"){
    const visitorName = document.getElementById("f-visitor").value.trim();
    if(!visitorName){ showModalError("来客者名を入力してください。"); return; }
    booking.visitorName = visitorName;
    booking.resource = GUEST_RESOURCE;
    if(document.getElementById("f-linkroom-check").checked){
      const roomResource = document.getElementById("f-linkroom-resource").value;
      booking.roomResource = roomResource;
      await loadBookings();
      if(hasOverlap("room", roomResource, date, start, end, editingLinkedRoomId)){
        showModalError(`この時間帯は既に「${roomResource}」が予約されています。会議室の時間を調整してください。`);
        return;
      }
    } else {
      booking.roomResource = "";
    }
  } else {
    const resource = document.getElementById("f-resource").value;
    booking.resource = resource;
    await loadBookings();
    if(hasOverlap(category, resource, date, start, end, editingId)){
      showModalError(`この時間帯は既に「${resource}」が予約されています。別の時間または別の対象を選んでください。`);
      return;
    }
  }

  const isRecurring = !editingId && document.getElementById("f-recurring-check").checked;

  const submitBtn = document.querySelector("#overlay .btn-primary");

  if(isRecurring){
    submitBtn.disabled = true; submitBtn.textContent = "送信中…";
    const gen = await generateRecurringDates(date);
    if(gen.error){
      submitBtn.disabled = false; submitBtn.textContent = "予約を確定する";
      showModalError(gen.error);
      return;
    }
    const dates = gen.dates;
    const monthSkipped = gen.skipped || [];

    const results = [];
    for(let i=0;i<dates.length;i++){
      submitBtn.textContent = `送信中…（${i+1}/${dates.length}）`;
      const occBooking = Object.assign({}, booking, { date: dates[i] });
      try{
        const r = await addBookingRemote(occBooking);
        results.push({ date: dates[i], success: !!r.success, error: r.error });
      }catch(e){
        results.push({ date: dates[i], success: false, error: "通信エラー" });
      }
    }
    submitBtn.disabled = false; submitBtn.textContent = "予約を確定する";

    const failList = results.filter(r => !r.success);
    const successCount = results.length - failList.length;

    await loadBookings();
    closeModal();
    currentCategory = category;
    document.querySelectorAll(".tab-btn").forEach(b => b.classList.toggle("active", b.dataset.cat === category));
    currentDate = date;
    document.getElementById("date-input").value = date;
    render();

    const noteParts = [];
    if(failList.length > 0) noteParts.push(`重複のためスキップ: ${failList.map(f=>f.date).join("、")}`);
    if(monthSkipped.length > 0) noteParts.push(`該当日なしでスキップ: ${monthSkipped.join("、")}`);

    if(noteParts.length === 0){
      showToast(`繰り返し予約を${results.length}件登録しました（${empName} / ${start}〜${end}）`, false, 4500);
    } else {
      showToast(`${successCount}/${results.length}件登録しました。${noteParts.join(" / ")}`, true, 8000);
    }
    return;
  }

  submitBtn.disabled = true; submitBtn.textContent = "送信中…";
  let result;
  try{
    result = editingId ? await editBookingRemote(editingId, booking) : await addBookingRemote(booking);
  }catch(e){
    submitBtn.disabled = false; submitBtn.textContent = editingId ? "変更を保存" : "予約を確定する";
    showModalError("通信に失敗しました。時間を置いて再度お試しください。");
    return;
  }
  submitBtn.disabled = false; submitBtn.textContent = editingId ? "変更を保存" : "予約を確定する";

  if(!result.success){
    showModalError(result.error || "処理に失敗しました。もう一度お試しください。");
    await loadBookings(); render();
    return;
  }

  const wasEditing = !!editingId;
  await loadBookings();
  closeModal();
  currentCategory = category;
  document.querySelectorAll(".tab-btn").forEach(b => b.classList.toggle("active", b.dataset.cat === category));
  currentDate = date;
  document.getElementById("date-input").value = date;
  render();
  showToast(wasEditing ? `予約を更新しました（${empName} / ${start}〜${end}）` : `予約しました（${empName} / ${start}〜${end}）`);
}

// ---------- cancel modal ----------
function openCancelModal(id){
  const b = bookings.find(x => x.id === id);
  if(!b) return;
  pendingCancelId = id;
  hideCancelModalError();

  const catLabel = b.category === "room" ? "会議室" : (b.category === "car" ? "社用車" : "来客");
  let summary = `${catLabel}「${escapeHtml(b.resource)}」<br>${escapeHtml(b.date)} ${b.start}〜${b.end}<br>件名: ${escapeHtml(b.purpose)}<br>予約者: ${escapeHtml(b.empName)}`;
  if(b.visitorName) summary += `<br>来客者: ${escapeHtml(b.visitorName)}`;
  if(b.memo) summary += `<br>メモ: ${escapeHtml(b.memo)}`;
  if(b.linkedId) summary += `<br><span style="color:var(--hanko-dark)">※ 紐づく会議室予約 / 来客記録も同時に取り消されます</span>`;
  document.getElementById("cancel-summary").innerHTML = summary;

  document.getElementById("cancel-overlay").classList.add("show");
}
function closeCancelModal(){ document.getElementById("cancel-overlay").classList.remove("show"); pendingCancelId = null; }
function showCancelModalError(msg){
  const el = document.getElementById("cancel-modal-error");
  el.textContent = msg;
  el.classList.add("show");
  el.scrollIntoView({ behavior: "smooth", block: "nearest" });
}
function hideCancelModalError(){ document.getElementById("cancel-modal-error").classList.remove("show"); }

async function confirmCancel(){
  if(!pendingCancelId) return;
  const b = bookings.find(x => x.id === pendingCancelId);
  const cascade = !!(b && b.linkedId);

  const btn = document.querySelector("#cancel-overlay .btn-danger");
  btn.disabled = true; btn.textContent = "処理中…";
  let result;
  try{
    result = await cancelBookingRemote(pendingCancelId, cascade);
  }catch(e){
    btn.disabled = false; btn.textContent = "取り消す";
    showCancelModalError("通信に失敗しました。時間を置いて再度お試しください。");
    return;
  }
  btn.disabled = false; btn.textContent = "取り消す";

  if(!result.success){
    showCancelModalError(result.error || "取り消しに失敗しました。");
    return;
  }
  closeCancelModal();
  await loadBookings();
  render();
  showToast("予約を取り消しました");
}

// ---------- toast ----------
let toastTimer = null;
function showToast(msg, isErr, durationMs){
  const t = document.getElementById("toast");
  document.getElementById("toast-text").textContent = msg;
  t.classList.toggle("err", !!isErr);
  t.classList.add("show");
  clearTimeout(toastTimer);
  toastTimer = setTimeout(()=> t.classList.remove("show"), durationMs || 3200);
}

// ---------- init ----------
(async function init(){
  populateTimeSelects();
  document.getElementById("date-input").value = currentDate;
  await loadBookings();
  render();
  setInterval(async ()=>{
    try{ await loadBookings(); render(); }catch(e){}
  }, 15000);
})();
</script>
